<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – VELOUR</title>
  <meta name="description" content="Sign in or create your VELOUR account to start shopping." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">V<span>ELOUR</span></a>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="category.html" class="nav-link">Category</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
        <li><a href="login.html" class="nav-link btn-nav active">Login</a></li>
      </ul>
      <div class="nav-actions">
        <button class="cart-btn" aria-label="View cart">🛍️<span class="cart-count hidden">0</span></button>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>
  </nav>

  <main class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <a href="index.html">V<span>ELOUR</span></a>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Sign In</div>
        <div class="auth-tab" data-tab="register">Create Account</div>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form active" id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="loginEmail" name="email" placeholder="your@email.com" required autocomplete="email" />
          </div>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required autocomplete="current-password" />
          </div>
          <span class="error-msg"></span>
        </div>
        <div class="form-options">
          <label class="remember-label">
            <input type="checkbox" name="remember" /> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="auth-submit">Sign In →</button>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-auth">
          <button type="button" class="social-auth-btn" data-provider="Google">
            <span class="social-icon">🔵</span> Continue with Google
          </button>
          <button type="button" class="social-auth-btn" data-provider="Facebook">
            <span class="social-icon">📘</span> Continue with Facebook
          </button>
        </div>
        <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-light);">
          Don't have an account?
          <a href="#" style="color:var(--accent-dark);font-weight:600;" onclick="document.querySelector('[data-tab=register]').click();return false;">Sign up free</a>
        </p>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form" id="registerForm" novalidate>
        <div class="form-group">
          <label for="regName">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="regName" name="fullName" placeholder="Your full name" required autocomplete="name" />
          </div>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="regEmail" name="email" placeholder="your@email.com" required autocomplete="email" />
          </div>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="regPassword" name="password" placeholder="At least 6 characters" required autocomplete="new-password" />
          </div>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="regConfirm" name="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password" />
          </div>
          <span class="error-msg"></span>
        </div>
        <button type="submit" class="auth-submit">Create Account →</button>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-auth">
          <button type="button" class="social-auth-btn" data-provider="Google">
            <span class="social-icon">🔵</span> Continue with Google
          </button>
          <button type="button" class="social-auth-btn" data-provider="Facebook">
            <span class="social-icon">📘</span> Continue with Facebook
          </button>
        </div>
        <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-light);">
          Already have an account?
          <a href="#" style="color:var(--accent-dark);font-weight:600;" onclick="document.querySelector('[data-tab=login]').click();return false;">Sign in</a>
        </p>
      </form>

    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
